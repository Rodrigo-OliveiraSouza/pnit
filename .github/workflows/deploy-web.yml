name: Deploy Web

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Prepare build environment
        shell: bash
        run: |
          rm -f .env.production
          touch .env.production

          if [ -n "${{ vars.VITE_API_BASE_URL }}" ]; then
            echo "VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}" >> .env.production
          fi

          if [ -n "${{ vars.VITE_GOOGLE_MAPS_MAP_ID }}" ]; then
            echo "VITE_GOOGLE_MAPS_MAP_ID=${{ vars.VITE_GOOGLE_MAPS_MAP_ID }}" >> .env.production
          fi

          if [ -n "${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" ]; then
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" >> .env.production
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web
          wranglerVersion: "4.59.2"
          command: pages deploy dist --project-name=pnit --branch=master
